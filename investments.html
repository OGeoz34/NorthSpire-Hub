<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0c10">
<meta name="description" content="Northspire Investment Hub — a transparent, real-time log of the moves across stocks, crypto, AI, collectibles, and more.">
<title>Investment Hub — Northspire Ventures</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Albert+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ==========================================================================
   NORTHSPIRE — Investment Hub
   Inherits the exact design tokens from the hub and founder pages.
   ========================================================================== */
:root{
  --bg:#0a0c10; --surface:#10141b; --surface-2:#141a23;
  --border:#1e2530; --border-lit:#2c3644;
  --text:#e9ecf1; --muted:#8c95a3; --faint:#5b6472;
  --accent:#a3c4dc; --accent-soft:rgba(163,196,220,.10); --glow:rgba(163,196,220,.07);
  --up:#7fcf9f; --up-soft:rgba(127,207,159,.12);
  --down:#e08a8a; --down-soft:rgba(224,138,138,.12);
  --font-display:'Marcellus','Times New Roman',serif;
  --font-body:'Albert Sans',-apple-system,'SF Pro Text',system-ui,sans-serif;
  --radius:18px; --radius-sm:14px; --gutter:20px;
  --shadow:0 1px 2px rgba(0,0,0,.4), 0 12px 32px rgba(0,0,0,.35);
  --shadow-lift:0 2px 4px rgba(0,0,0,.4), 0 20px 48px rgba(0,0,0,.5);
  --glass:rgba(20,26,35,.55); --maxw:920px;
}
*{ margin:0; padding:0; box-sizing:border-box; }
html{ scroll-behavior:smooth; -webkit-text-size-adjust:100%; text-size-adjust:100%; }
body{
  background:var(--bg); color:var(--text); font-family:var(--font-body);
  font-size:16px; line-height:1.6; -webkit-font-smoothing:antialiased;
  min-height:100dvh; overflow-x:hidden;
}
/* Hero glow is wider than the viewport on phones; keep it from creating scroll */
.hero{ overflow:visible; }
.hero::before{ max-width:100vw; }
::selection{ background:var(--accent); color:var(--bg); }
a{ color:inherit; text-decoration:none; }
#sky{ position:fixed; inset:0; z-index:-1; pointer-events:none; }

.wrap{ width:100%; max-width:var(--maxw); margin:0 auto; padding:0 var(--gutter) calc(80px + env(safe-area-inset-bottom)); }

/* ---- Back nav ---- */
.topbar{ max-width:var(--maxw); margin:0 auto; padding:22px var(--gutter) 0; display:flex; align-items:center; justify-content:space-between; }
.back{ display:inline-flex; align-items:center; gap:8px; font-size:13px; letter-spacing:.04em; color:var(--muted); transition:color .28s ease; }
.back svg{ width:15px; height:15px; transition:transform .28s ease; }
.back:hover{ color:var(--accent); } .back:hover svg{ transform:translateX(-3px); }
.topbar .brand{ font-family:var(--font-display); font-size:13px; letter-spacing:.28em; text-transform:uppercase; color:var(--faint); }

/* ==========================================================================
   HERO
   ========================================================================== */
.hero{ text-align:center; padding:60px 8px 34px; position:relative; }
.hero::before{ content:""; position:absolute; top:-40px; left:50%; width:480px; height:480px; transform:translateX(-50%); background:radial-gradient(closest-side,var(--glow),transparent 70%); pointer-events:none; }
.hero .eyebrow{ font-size:11.5px; font-weight:600; letter-spacing:.34em; text-transform:uppercase; color:var(--accent); margin-bottom:18px; }
.hero h1{ font-family:var(--font-display); font-weight:400; font-size:clamp(30px,7vw,46px); letter-spacing:.03em; margin-bottom:16px; }
.hero p{ color:var(--muted); max-width:56ch; margin:0 auto; font-size:clamp(15px,2.3vw,17px); }

/* ==========================================================================
   SUMMARY STRIP  (aggregate stats)
   ========================================================================== */
.summary{ display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-top:38px; }
.stat{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; text-align:center; }
.stat .k{ font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint); margin-bottom:8px; }
.stat .v{ font-family:var(--font-display); font-size:clamp(22px,4vw,28px); letter-spacing:.02em; }
.stat .v.up{ color:var(--up); } .stat .v.down{ color:var(--down); }

/* ==========================================================================
   FILTERS
   ========================================================================== */
.filters{ display:flex; flex-wrap:wrap; gap:8px; margin:40px 0 20px; }
.filter{
  font-size:12.5px; letter-spacing:.04em; color:var(--muted);
  background:var(--surface); border:1px solid var(--border); border-radius:20px;
  padding:9px 16px; cursor:pointer; transition:border-color .25s ease, color .25s ease, background .25s ease;
  -webkit-tap-highlight-color:transparent;
}
.filter:hover{ border-color:var(--border-lit); color:var(--text); }
.filter.active{ color:var(--accent); border-color:rgba(163,196,220,.4); background:var(--accent-soft); }
.filter:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

/* ==========================================================================
   POSITION CARDS
   ========================================================================== */
.positions{ display:grid; gap:14px; }
.position{
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:20px; box-shadow:var(--shadow);
  transition:transform .3s cubic-bezier(.2,.8,.2,1), border-color .3s ease, background .3s ease, box-shadow .3s ease, opacity .3s ease;
}
.position:hover{ transform:translateY(-2px); border-color:var(--border-lit); background:var(--surface-2); box-shadow:var(--shadow-lift); }
.position.hide{ display:none; }

/* Header row: asset + action + status */
.pos-top{ display:flex; align-items:flex-start; gap:14px; margin-bottom:16px; }
.pos-cat{
  flex:none; width:44px; height:44px; border-radius:12px; display:grid; place-items:center;
  background:var(--accent-soft); border:1px solid rgba(163,196,220,.14);
  font-size:20px;
}
.pos-cat.has-logo{ background:rgba(255,255,255,.035); border-color:rgba(255,255,255,.09); padding:0; }
.asset-logo{ width:22px; height:22px; display:block; overflow:visible; }
.asset-logo.eth{ width:15px; height:24px; color:#e6ecf2; }
.pos-id{ flex:1; min-width:0; }
.pos-id h3{ font-family:var(--font-display); font-weight:400; font-size:19px; letter-spacing:.02em; }
.pos-id .sub{ font-size:12.5px; color:var(--faint); margin-top:2px; letter-spacing:.04em; }
.pos-tags{ display:flex; flex-direction:column; align-items:flex-end; gap:6px; flex:none; }
.badge{ font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; border-radius:20px; padding:4px 11px; white-space:nowrap; }
.badge.buy{ color:var(--up); background:var(--up-soft); border:1px solid rgba(127,207,159,.25); }
.badge.sell,.badge.trim{ color:var(--down); background:var(--down-soft); border:1px solid rgba(224,138,138,.25); }
.badge.hold,.badge.watch{ color:var(--accent); background:var(--accent-soft); border:1px solid rgba(163,196,220,.25); }
.badge.status{ color:var(--muted); border:1px solid var(--border-lit); }
.badge.status.open{ color:var(--accent); border-color:rgba(163,196,220,.3); }

/* Metrics grid (entry/target/size/P&L — any field optional) */
.pos-metrics{ display:grid; grid-template-columns:repeat(2,1fr); gap:1px; background:var(--border); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:14px; }
.metric{ background:var(--surface); padding:12px 14px; }
.metric:last-child:nth-child(odd){ grid-column:1 / -1; }
.position:hover .metric{ background:var(--surface-2); }
.metric .mk{ font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--faint); margin-bottom:4px; }
.metric .mv{ font-size:15px; font-variant-numeric:tabular-nums; }
.metric .mv.up{ color:var(--up); } .metric .mv.down{ color:var(--down); }
.metric .mv .mby{ font-size:11px; color:var(--faint); letter-spacing:.06em; font-variant-numeric:normal; }

/* The ask — CTA into The Exchange */
.ask{
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  margin-top:16px; padding:12px 14px; border-radius:12px;
  border:1px dashed rgba(203,184,146,.32); background:rgba(203,184,146,.05);
  color:var(--muted); font-size:13px; line-height:1.35; text-decoration:none;
  transition:border-color .25s ease, background .25s ease, color .25s ease, transform .2s ease;
}
.ask:hover{
  border-color:rgba(203,184,146,.7); border-style:solid;
  background:rgba(203,184,146,.1); color:var(--text); transform:translateY(-1px);
}
.ask:active{ transform:scale(.99); }
.ask .ask-arrow{ width:15px; height:15px; flex:none; transition:transform .25s ease; }
.ask:hover .ask-arrow{ transform:translateX(3px); }

/* ==========================================================================
   THE VAULT — graded slab gallery
   ========================================================================== */
.vault-btn{
  display:flex; align-items:center; gap:12px; width:100%;
  margin-top:16px; padding:12px 14px; border-radius:12px; cursor:pointer;
  border:1px solid var(--border-lit); background:var(--surface-2);
  color:var(--text); font-size:13px; font-family:var(--font-body); text-align:left;
  transition:border-color .25s ease, background .25s ease, transform .2s ease, box-shadow .25s ease;
}
.vault-btn:hover{ border-color:#F58426; background:#161c26; transform:translateY(-1px); box-shadow:0 8px 24px -12px rgba(245,132,38,.35); }
.vault-btn:active{ transform:scale(.99); }
.vb-flag{ flex:none; width:5px; height:22px; border-radius:2px; background:#d33; box-shadow:0 0 10px -2px rgba(221,51,51,.7); }
.vb-txt{ flex:1; }
.vb-arrow{ width:15px; height:15px; flex:none; transition:transform .25s ease; }
.vault-btn:hover .vb-arrow{ transform:translateX(3px); }

/* Overlay */
.vault{ position:fixed; inset:0; z-index:80; display:none; }
.vault.open{ display:block; }
.vault-veil{ position:absolute; inset:0; background:rgba(6,8,12,.86); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); }
.vault-veil::before,.vault-veil::after{
  content:""; position:absolute; width:52vw; height:52vw; border-radius:50%; filter:blur(90px); opacity:.16; pointer-events:none;
}
.vault-veil::before{ top:-18vw; left:-14vw; background:#006BB6; }
.vault-veil::after{ bottom:-20vw; right:-14vw; background:#F58426; }
.vault-panel{ position:relative; height:100%; overflow-y:auto; overscroll-behavior:contain; -webkit-overflow-scrolling:touch; }
.vault-inner{ max-width:1180px; margin:0 auto; padding:26px 18px 70px; }

.vault-head{ display:flex; align-items:flex-start; gap:14px; margin-bottom:6px; }
.vault-title h2{ font-family:var(--font-display); font-weight:400; font-size:clamp(24px,5vw,34px); letter-spacing:.03em; }
.vault-title .vsub{ color:var(--muted); font-size:13px; margin-top:6px; letter-spacing:.04em; }
.vault-close{
  margin-left:auto; flex:none; width:40px; height:40px; border-radius:50%; cursor:pointer;
  border:1px solid var(--border-lit); background:var(--glass); color:var(--text);
  display:grid; place-items:center; font-size:17px; line-height:1;
  transition:border-color .2s ease, transform .2s ease;
}
.vault-close:hover{ border-color:#F58426; transform:rotate(90deg); }

.vault-stats{ display:flex; flex-wrap:wrap; gap:8px; margin:14px 0 4px; }
.vstat{ font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted);
  border:1px solid var(--border); background:var(--surface); border-radius:20px; padding:6px 12px; }
.vstat strong{ color:var(--text); font-weight:600; }

.vault-filters{ display:flex; gap:8px; flex-wrap:wrap; margin:14px 0 22px; }
.vf{ font-size:12px; letter-spacing:.05em; color:var(--muted); cursor:pointer;
  border:1px solid var(--border); background:var(--surface); border-radius:20px; padding:7px 14px;
  transition:color .2s ease, border-color .2s ease, background .2s ease; font-family:var(--font-body); }
.vf:hover{ color:var(--text); border-color:var(--border-lit); }
.vf.active{ color:#0a0c10; background:var(--accent); border-color:var(--accent); font-weight:600; }

/* Slab wall — masonry columns preserve each slab's natural height */
.vault-grid{ columns:4 230px; column-gap:16px; }
.slab{ break-inside:avoid; margin:0 0 16px; cursor:pointer; position:relative;
  border-radius:14px; border:1px solid var(--border); background:var(--surface);
  overflow:hidden; transform-style:preserve-3d; will-change:transform;
  transition:transform .18s ease, border-color .25s ease, box-shadow .25s ease, opacity .5s ease;
}
.slab.hide{ display:none; }
.slab:hover{ border-color:var(--border-lit); box-shadow:0 22px 44px -18px rgba(0,0,0,.75); z-index:2; }
.slab-flag{ height:5px; background:#d33; }                    /* the PSA label bar */
.slab-flag.alt{ background:#8c95a3; }                          /* non-PSA grader */
.slab img{ display:block; width:100%; height:auto; }
.slab-meta{ padding:10px 12px 12px; position:relative; }
.slab-meta .sp{ font-family:var(--font-display); font-size:15px; letter-spacing:.03em; }
.slab-meta .ss{ font-size:11px; color:var(--faint); margin-top:3px; letter-spacing:.04em; line-height:1.45; }
.slab-grade{ position:absolute; top:-16px; right:10px; min-width:34px; height:34px; padding:0 8px;
  border-radius:9px; display:grid; place-items:center;
  background:#d33; color:#fff; font-weight:700; font-size:15px; letter-spacing:.02em;
  box-shadow:0 6px 16px -6px rgba(221,51,51,.7); }
.slab-grade.alt{ background:#3a424e; box-shadow:none; }
.slab-tags{ position:absolute; top:12px; left:8px; display:flex; flex-direction:column; gap:5px; }
.stag{ font-size:9px; font-weight:700; letter-spacing:.12em; padding:3px 7px; border-radius:5px;
  background:rgba(8,10,14,.78); color:#f0c987; border:1px solid rgba(240,201,135,.35); backdrop-filter:blur(4px); }

/* Holo sheen — sweeps on hover, like tilting a refractor under light */
.slab::after{ content:""; position:absolute; inset:0; pointer-events:none; opacity:0;
  background:linear-gradient(115deg, transparent 30%, rgba(163,196,220,.16) 42%, rgba(245,132,38,.10) 50%, rgba(163,196,220,.16) 58%, transparent 70%);
  background-size:280% 100%; background-position:110% 0; transition:opacity .3s ease; }
@media (hover:hover) and (prefers-reduced-motion: no-preference){
  .slab:hover::after{ opacity:1; animation:sheen 1.6s ease forwards; }
  @keyframes sheen{ to{ background-position:-40% 0; } }
}

/* Lightbox */
.vlb{ position:fixed; inset:0; z-index:90; display:none; }
.vlb.open{ display:block; }
.vlb-veil{ position:absolute; inset:0; z-index:0; background:rgba(4,5,8,.92); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); }
.vlb-box{ position:relative; z-index:1; height:100%; display:grid; grid-template-columns:1fr minmax(250px,320px);
  gap:0; max-width:1080px; margin:0 auto; padding:56px 18px 32px; align-items:center; }
.vlb-imgwrap{ display:grid; place-items:center; height:100%; min-height:0; }
.vlb-imgwrap img{ max-width:100%; max-height:calc(100vh - 110px); border-radius:12px;
  box-shadow:0 30px 80px -20px rgba(0,0,0,.9); }
.vlb-meta{ padding:0 6px 0 28px; }
.vlb-meta .eyebrow{ font-size:10.5px; letter-spacing:.28em; text-transform:uppercase; color:var(--faint); margin-bottom:10px; }
.vlb-meta h3{ font-family:var(--font-display); font-weight:400; font-size:26px; letter-spacing:.02em; margin-bottom:4px; }
.vlb-meta .set{ color:var(--muted); font-size:14px; line-height:1.55; }
.vlb-rows{ margin:18px 0; border-top:1px solid var(--border); }
.vlb-row{ display:flex; justify-content:space-between; gap:14px; padding:9px 0; border-bottom:1px solid var(--border); font-size:13px; }
.vlb-row .k{ color:var(--faint); letter-spacing:.08em; text-transform:uppercase; font-size:10.5px; padding-top:2px; }
.vlb-row .v{ color:var(--text); text-align:right; }
.vlb-cert{ display:inline-flex; align-items:center; gap:7px; margin-top:4px; font-size:12.5px;
  color:var(--accent); text-decoration:none; border-bottom:1px dashed rgba(163,196,220,.4); padding-bottom:2px; }
.vlb-cert:hover{ border-bottom-style:solid; }
.vlb-count{ position:absolute; z-index:3; top:20px; left:50%; transform:translateX(-50%);
  font-size:11px; letter-spacing:.2em; color:var(--faint); pointer-events:none; }
.vlb-close{ position:absolute; z-index:3; top:14px; right:16px; width:40px; height:40px; border-radius:50%;
  border:1px solid var(--border-lit); background:var(--glass); color:var(--text); cursor:pointer;
  display:grid; place-items:center; font-size:17px; transition:border-color .2s, transform .2s; }
.vlb-close:hover{ border-color:#F58426; transform:rotate(90deg); }
.vlb-nav{ position:absolute; z-index:3; top:50%; transform:translateY(-50%); width:44px; height:44px; border-radius:50%;
  border:1px solid var(--border-lit); background:var(--glass); color:var(--text); cursor:pointer;
  display:grid; place-items:center; transition:border-color .2s, background .2s; }
.vlb-nav:hover{ border-color:var(--accent); background:var(--surface-2); }
.vlb-nav svg{ width:18px; height:18px; }
.vlb-prev{ left:14px; } .vlb-next{ right:14px; }

@media (max-width:760px){
  .vlb-box{ grid-template-columns:1fr; padding:56px 14px 24px; overflow-y:auto; align-items:start; }
  .vlb-imgwrap img{ max-height:58vh; }
  .vlb-meta{ padding:18px 4px 78px; }
  .vlb-nav{ top:auto; bottom:12px; transform:none; }
  .vlb-prev{ left:calc(50% - 56px); } .vlb-next{ right:calc(50% - 56px); }
  .vault-grid{ columns:2 150px; column-gap:12px; }
  .slab{ margin-bottom:12px; }
}
@media (prefers-reduced-motion: reduce){
  .slab, .vault-close, .vlb-close, .vb-arrow{ transition:none; }
}

/* Thesis / note */
.pos-note{ color:var(--muted); font-size:14px; line-height:1.6; }
.pos-note .lbl{ color:var(--faint); font-size:11px; letter-spacing:.12em; text-transform:uppercase; display:block; margin-bottom:5px; }

/* Conviction dots */
.conv{ display:inline-flex; gap:3px; vertical-align:middle; margin-left:8px; }
.conv i{ width:6px; height:6px; border-radius:50%; background:var(--border-lit); display:inline-block; }
.conv i.on{ background:var(--accent); }

/* Empty state */
.empty{ text-align:center; color:var(--faint); padding:50px 20px; font-size:14px; }

/* Receipt line — the timestamped "I called it" proof */
.receipt{
  display:flex; align-items:center; gap:8px;
  font-size:12.5px; color:var(--muted); margin-bottom:14px;
  padding:9px 12px; border-radius:10px;
  background:var(--accent-soft); border:1px solid rgba(163,196,220,.14);
}
.receipt strong{ color:var(--text); font-weight:600; }
.receipt-dot{ width:7px; height:7px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px rgba(163,196,220,.6); flex:none; }

/* ==========================================================================
   LAUNDROMAT GOAL BAR
   ========================================================================== */
.goal-wrap{ margin-top:40px; }
.goal-card{
  background:linear-gradient(180deg, var(--surface-2), var(--surface));
  border:1px solid var(--border-lit); border-radius:var(--radius);
  padding:clamp(22px,4vw,32px); box-shadow:var(--shadow-lift); position:relative; overflow:hidden;
}
.goal-card::before{
  content:""; position:absolute; top:-80px; right:-40px; width:280px; height:280px;
  background:radial-gradient(closest-side, var(--glow), transparent 70%); pointer-events:none;
}
.goal-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:22px; }
.goal-eyebrow{ font-size:10.5px; letter-spacing:.2em; text-transform:uppercase; color:var(--accent); margin-bottom:8px; }
.goal-title{ font-family:var(--font-display); font-weight:400; font-size:clamp(22px,4vw,28px); letter-spacing:.02em; }
.goal-sub{ color:var(--muted); font-size:13.5px; margin-top:4px; }
.goal-pct{ font-family:var(--font-display); font-size:clamp(26px,5vw,36px); color:var(--accent); font-variant-numeric:tabular-nums; flex:none; }

/* Track + fill */
.goal-track{ position:relative; height:14px; border-radius:20px; background:var(--bg); border:1px solid var(--border); overflow:hidden; }
.goal-fill{
  height:100%; border-radius:20px;
  background:linear-gradient(90deg, rgba(163,196,220,.55), var(--accent));
  box-shadow:0 0 16px rgba(163,196,220,.4); transition:none;
}
.goal-mile{ position:absolute; top:0; bottom:0; width:1px; background:var(--border-lit); transform:translateX(-.5px); }
.goal-mile:last-child{ background:transparent; }

/* Figures row */
.goal-figures{ display:flex; justify-content:space-between; gap:12px; margin-top:18px; }
.goal-figures > div{ display:flex; flex-direction:column; gap:3px; }
.goal-figures .gf-mid{ text-align:center; }
.goal-figures .gf-end{ text-align:right; }
.gf-k{ font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); }
.gf-v{ font-family:var(--font-display); font-size:clamp(17px,3vw,22px); font-variant-numeric:tabular-nums; letter-spacing:.02em; }
.gf-v.up{ color:var(--up); }
.goal-note{ color:var(--muted); font-size:13.5px; line-height:1.6; margin-top:20px; padding-top:18px; border-top:1px solid var(--border); }

/* Disclaimer */
.disclaimer{ margin-top:40px; padding:18px 20px; border:1px solid var(--border); border-radius:var(--radius); background:var(--glass); -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px); }
.disclaimer p{ color:var(--faint); font-size:12.5px; line-height:1.6; }

footer{ margin-top:60px; text-align:center; color:var(--faint); font-size:12px; letter-spacing:.12em; }
footer .fm{ width:14px; height:14px; margin:0 auto 14px; color:var(--accent); opacity:.55; }

/* Scroll reveal */
.reveal{ opacity:0; transform:translateY(22px); transition:opacity .7s cubic-bezier(.2,.8,.2,1), transform .7s cubic-bezier(.2,.8,.2,1); }
.reveal.in{ opacity:1; transform:none; }

@media (prefers-reduced-motion: reduce){
  html{ scroll-behavior:auto; }
  .reveal{ opacity:1; transform:none; transition:none; }
}

@media (min-width:640px){
  .summary{ grid-template-columns:repeat(4,1fr); }
  .pos-metrics{ grid-template-columns:repeat(4,1fr); }
}
@media (min-width:720px){
  :root{ --gutter:32px; }
  .hero{ padding-top:80px; }
}

<body>

<canvas id="sky" aria-hidden="true"></canvas>

<div class="topbar">
  <a class="back" href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 6l-6 6 6 6"/></svg>
    <span>Back to Hub</span>

</div>

    <p id="year"></p>
  </footer>

</div>

<script>
/* ==========================================================================
   NORTHSPIRE INVESTMENT HUB — Configuration
   --------------------------------------------------------------------------
   THIS IS YOUR CONTROL PANEL. Everything is a plain value you edit.

   THE "RECEIPT" MODEL for each position:
     - purchaseDate  = the day you called it ("proof I said this before it moved")
     - purchasePrice = what you paid that day (your cost basis / the receipt)
     - currentPrice  = today's price (update when you refresh the page)
   The card auto-calculates the gain/loss % between purchase and current and
   colors it green/red. Leave currentPrice '' to show the call with no P&L yet.

   POST A NEW MOVE: copy one { } block in POSITIONS and edit the fields.
   HIDE a field: set it to '' (empty). Nothing is hardcoded or guessed.

   Fields:
     category      one of the CATEGORIES keys (icon + filter)
     asset         name/ticker, e.g. 'SOL', 'HAPI', 'Moonbreon'
     sub           subtitle, e.g. 'Solana' or 'Umbreon VMAX Alt Art 215 / PSA 10'
     action        'buy' | 'sell' | 'trim' | 'hold' | 'watch'  (badge color)
     status        'open' | 'closed'
     purchaseDate  'YYYY-MM-DD'   <- the receipt date
     purchasePrice e.g. '$81.00'  <- what you paid  (blank = accumulating)
     currentPrice  e.g. '$92.00'  <- today (blank hides P&L)
     target        optional goal price, e.g. '$300'
     conviction    1-5 (optional dots)
     note          your thesis / why
   ========================================================================== */

/* ==========================================================================
   ASSET LOGOS — official brand marks, drawn inline (no external requests).
   Add a `logo:'key'` field to any position to use one of these instead of
   the generic category glyph. To add another coin later, paste its SVG here
   under a new key and reference it from the position.
   ========================================================================== */
const ASSET_LOGOS = {
  /* Solana — official mark, brand gradient (#00FFA3 -> #DC1FFF) */
  solana:
    '<svg class="asset-logo" viewBox="0 0 397.7 311.7" role="img" aria-label="Solana">' +
      '<defs><linearGradient id="solGrad" x1="360.9" y1="-37.5" x2="141.2" y2="383.3" ' +
        'gradientUnits="userSpaceOnUse">' +
        '<stop offset="0" stop-color="#00ffa3"/><stop offset="1" stop-color="#dc1fff"/>' +
      '</linearGradient></defs>' +
      '<path fill="url(#solGrad)" d="M64.6 237.9c2.4-2.4 5.7-3.8 9.2-3.8h317.4c5.8 0 8.7 7 4.6 11.1l-62.7 62.7c-2.4 2.4-5.7 3.8-9.2 3.8H6.5c-5.8 0-8.7-7-4.6-11.1l62.7-62.7z"/>' +
      '<path fill="url(#solGrad)" d="M64.6 3.8C67.1 1.4 70.4 0 73.8 0h317.4c5.8 0 8.7 7 4.6 11.1l-62.7 62.7c-2.4 2.4-5.7 3.8-9.2 3.8H6.5c-5.8 0-8.7-7-4.6-11.1L64.6 3.8z"/>' +
      '<path fill="url(#solGrad)" d="M333.1 120.1c-2.4-2.4-5.7-3.8-9.2-3.8H6.5c-5.8 0-8.7 7-4.6 11.1l62.7 62.7c2.4 2.4 5.7 3.8 9.2 3.8h317.4c5.8 0 8.7-7 4.6-11.1l-62.7-62.7z"/>' +
    '</svg>',

  /* Ethereum — official mark, monochrome treatment (facets kept via opacity) */
  ethereum:
    '<svg class="asset-logo eth" viewBox="0 0 256 417" role="img" aria-label="Ethereum">' +
      '<path fill="currentColor" fill-opacity=".55" d="M127.96 0l-2.8 9.5v275.67l2.8 2.79 127.96-75.63z"/>' +
      '<path fill="currentColor" d="M127.96 0L0 212.32l127.96 75.64V154.16z"/>' +
      '<path fill="currentColor" fill-opacity=".55" d="M127.96 312.19l-1.58 1.92v98.2l1.58 4.6L256 236.59z"/>' +
      '<path fill="currentColor" d="M127.96 416.91v-104.72L0 236.59z"/>' +
      '<path fill="currentColor" fill-opacity=".35" d="M127.96 287.96l127.96-75.64-127.96-58.16z"/>' +
      '<path fill="currentColor" fill-opacity=".75" d="M0 212.32l127.96 75.64V154.16z"/>' +
    '</svg>'
};

const CATEGORIES = {
  stocks:  { label: 'Stocks',      icon: '\uD83D\uDCC8' },
  crypto:  { label: 'Crypto',      icon: '\u25C8' },
  ai:      { label: 'AI',          icon: '\u2726' },
  pokemon: { label: 'Pok\u00E9mon',icon: '\u25C6' },
  sports:  { label: 'Sports',      icon: '\uD83C\uDFC0' },
  yugioh:  { label: 'Yu-Gi-Oh!',   icon: '\u2B22' },
  other:   { label: 'Power Plays', icon: '\u2699' }
};

/* ---- YOUR MOVES. Fill purchasePrice with what YOU actually paid.
        purchaseDate is set to today as your timestamped receipt. ---- */
const POSITIONS = [
  {
    category:'crypto', asset:'SOL', sub:'Solana', logo:'solana',
    action:'buy', status:'open',
    purchaseDate:'2026-07-07',
    purchasePrice:'$28.00',      // cost basis
    currentPrice:'$81.00',       // current market (edit to refresh)
    conviction:5,
    note:'High-throughput layer-1 with real on-chain activity and growing institutional interest. A long-term conviction hold, not a trade.'
  },
  {
    /* ---- ETHEREUM — two entries: $800 and $1,500.
            purchasePrice below is the BLENDED basis assuming you bought an
            EQUAL NUMBER OF ETH at each price -> ($800 + $1,500) / 2 = $1,150.
            If you instead spent equal DOLLARS at each entry, the true basis is
            $1,043 (you got more coins at $800). Change the one number below. ---- */
    category:'crypto', asset:'ETH', sub:'Ethereum', logo:'ethereum',
    action:'buy', status:'open',
    purchaseDate:'2026-07-07',
    purchasePrice:'$1,150',      // blended basis — see note above
    currentPrice:'$1,794',
    conviction:5,
    note:'Ethereum is the settlement layer the rest of the space is actually built on \u2014 the bulk of stablecoins, tokenized assets, and DeFi either live on it or run on rollups that settle back to it. It has the deepest developer base of any chain by a wide margin, and since the shift to proof-of-stake it behaves like a productive asset rather than a static one: it can be staked for yield, and the fee burn retires supply as the network gets used. Spot ETFs opened the door for institutions to own it without ever touching a wallet. I averaged in at $800 and $1,500 and I am not trading this one \u2014 I am holding the infrastructure and letting the layer-2 ecosystem grow into it.'
  },
  {
    category:'stocks', asset:'HAPI', sub:'Harbor Human Capital Factor US Large Cap ETF',
    action:'buy', status:'open',
    purchaseDate:'2026-07-07',
    purchasePrice:'$30.00',      // cost basis
    currentPrice:'$44.68',
    conviction:4,
    note:'An ETF that weights companies by the strength of their corporate culture and how they treat their people. A bet that culture compounds into returns over time.'
  },
  {
    category:'pokemon', asset:'Umbreon VMAX', sub:'Evolving Skies #215 \u00B7 PSA 10',
    action:'buy', status:'open',
    purchaseDate:'2026-07-07',
    purchasePrice:'$3,000',      // cost basis from MyTCG Ledger
    currentPrice:'$4,500',       // best price from MyTCG Ledger (update as market moves)
    conviction:5,
    note:'The most iconic modern Pok\u00E9mon chase card. It held its value through the market crash better than almost anything else \u2014 a blue-chip collectible and a long-term hold. Tracked live in MyTCG Ledger.'
  },
  {
    category:'sports', asset:'Knicks Graded Collection', sub:'Brunson, Towns, Bridges, Hart, Anunoby, Robinson & more',
    gallery:true,
    action:'buy', status:'open',
    purchaseDate:'2026-07-07',
    purchasePrice:'',            // total in so far, or leave blank while accumulating
    currentPrice:'',             // blank = accumulating, no P&L yet
    conviction:4,
    note:'A graded vault of the current core \u2014 Brunson, Towns, Bridges, Hart, Anunoby, Robinson \u2014 plus a Melo throwback and a Kolek rookie. Grades run PSA 8 through 10, anchored by nine gem mints, a KAT on-card auto /150, and a Moonfall /99. A bet on the franchise\u2019s trajectory and on New York demand holding strong.'
  }
];

/* ---- THE LAUNDROMAT GOAL \u2014 the animated progress bar toward $1M.
        Update `saved` as you set capital aside; the bar animates on load. ---- */
const GOAL = {
  title:'The Laundromat',
  subtitle:'Saving toward a first cash-flowing business',
  saved: 42000,          // <- how much you have saved so far (EDIT THIS)
  target: 1000000,       // <- the goal
  note:'A real, boring, cash-flowing business \u2014 the kind that quietly funds everything else. Every dollar set aside is a step toward owning it outright.'
};

/* ---- THE ASK — the button on every card. Instead of publishing a price
        target, invite the room to call it. Links into The Exchange with the
        question pre-written and the category pre-selected. ---- */
const ASK = {
  label: 'What do you think the price will be \u2014 and by when?',
  href:  'exchange.html',              // <- The Exchange
  category: 'Investment Idea'          // must match a category in exchange.html
};

/* Optional: your public note about what these numbers mean. */
const DISCLAIMER = 'This is a personal log of my own positions, shared for transparency and to timestamp my thinking \u2014 not financial advice or a recommendation to buy or sell anything. I share reasoning, not tips. Do your own research and consult a licensed advisor before investing. Figures are approximate and updated periodically.';

/* ==========================================================================
   Renderer — you shouldn't need to edit below this line.
   ========================================================================== */
(function render(){
  const posEl = document.getElementById('positions');
  const filtEl = document.getElementById('filters');
  document.getElementById('disclaimer-text').textContent = DISCLAIMER;
  document.getElementById('year').textContent = '\u00A9 ' + new Date().getFullYear() + ' \u00B7 Northspire Investment Hub';

  /* --- helpers to parse "$1,234.50" -> 1234.5 --- */
  function num(v){ if(v==null) return null; const n=parseFloat(String(v).replace(/[^0-9.\-]/g,'')); return isNaN(n)?null:n; }
  function gain(p){
    const a=num(p.purchasePrice), b=num(p.currentPrice);
    if(a===null||b===null||a===0) return null;
    return Math.round(((b-a)/a)*1000)/10; // one decimal
  }

  /* Summary stats — average gain across positions that have both prices */
  const gains = POSITIONS.map(gain).filter(g=>g!==null);
  const avg = gains.length ? Math.round((gains.reduce((s,g)=>s+g,0)/gains.length)*10)/10 : null;
  const open = POSITIONS.filter(p => p.status !== 'closed').length;
  const cats = new Set(POSITIONS.map(p => p.category)).size;
  const summary = [
    ['Positions', String(POSITIONS.length), ''],
    ['Open', String(open), ''],
    ['Categories', String(cats), ''],
    ['Avg. Gain', avg===null?'\u2014':(avg>=0?'+':'')+avg+'%', avg===null?'':(avg>=0?'up':'down')]
  ];
  document.getElementById('summary').innerHTML = summary.map(s =>
    '<div class="stat"><div class="k">'+esc(s[0])+'</div><div class="v '+s[2]+'">'+esc(s[1])+'</div></div>'
  ).join('');

  /* Filters */
  const used = [...new Set(POSITIONS.map(p=>p.category))];
  filtEl.innerHTML = ['all', ...used].map((f,i)=>{
    const lbl = f==='all' ? 'All' : (CATEGORIES[f]?.label || f);
    return '<button class="filter'+(i===0?' active':'')+'" data-f="'+esc(f)+'">'+esc(lbl)+'</button>';
  }).join('');

  /* Cards */
  posEl.innerHTML = POSITIONS.map(card).join('') || '<div class="empty">No positions logged yet.</div>';

  /* Laundromat goal bar */
  renderGoal();

  /* Filter behaviour */
  filtEl.addEventListener('click', e=>{
    const btn = e.target.closest('.filter'); if(!btn) return;
    filtEl.querySelectorAll('.filter').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const f = btn.dataset.f;
    posEl.querySelectorAll('.position').forEach(c=> c.classList.toggle('hide', f!=='all' && c.dataset.cat!==f));
  });

  /* Scroll reveal */
  const io = ('IntersectionObserver' in window && !matchMedia('(prefers-reduced-motion: reduce)').matches)
    ? new IntersectionObserver((es)=>es.forEach(x=>{ if(x.isIntersecting){ x.target.classList.add('in'); io.unobserve(x.target); }}), {threshold:.1, rootMargin:'0px 0px -6% 0px'})
    : null;
  document.querySelectorAll('.reveal, .position').forEach((el,i)=>{
    el.classList.add('reveal');
    if(io){ el.style.transitionDelay = Math.min(i*40,240)+'ms'; io.observe(el); }
    else el.classList.add('in');
  });

  function card(p){
    const c = CATEGORIES[p.category] || CATEGORIES.other;
    const mark = (p.logo && ASSET_LOGOS[p.logo]) ? ASSET_LOGOS[p.logo] : c.icon;
    const markCls = (p.logo && ASSET_LOGOS[p.logo]) ? ' has-logo' : '';
    const g = gain(p);
    const plStr = g===null ? '' : (g>=0?'+':'')+g+'%';
    const plDir = g===null ? '' : (g>=0?' up':' down');

    /* Target may carry a deadline year: '$4,500' + targetBy '2028' */
    const targetHTML = p.target
      ? esc(p.target) + (p.targetBy ? ' <span class="mby">by '+esc(p.targetBy)+'</span>' : '')
      : '';

    const metrics = [
      ['Bought', esc(p.purchasePrice)],
      ['Now', esc(p.currentPrice)],
      ['Target', targetHTML],
      ['Gain', esc(plStr)]
    ].filter(m => m[1] && String(m[1]).trim());
    const metricHTML = metrics.map(m=>{
      const dir = m[0]==='Gain' ? plDir : '';
      return '<div class="metric"><div class="mk">'+esc(m[0])+'</div><div class="mv'+dir+'">'+m[1]+'</div></div>';
    }).join('');

    const conv = p.conviction ? '<span class="conv" title="Conviction '+p.conviction+'/5" aria-label="Conviction '+p.conviction+' of 5">'+
      [1,2,3,4,5].map(n=>'<i class="'+(n<=p.conviction?'on':'')+'"></i>').join('')+'</span>' : '';
    const actionCls = ({buy:'buy',sell:'sell',trim:'trim',hold:'hold',watch:'watch'})[p.action] || 'hold';
    const statusBadge = p.status ? '<span class="badge status '+esc(p.status)+'">'+esc(p.status)+'</span>' : '';

    /* Receipt line — the timestamped "I called it" proof */
    const receipt = p.purchaseDate
      ? '<div class="receipt"><span class="receipt-dot" aria-hidden="true"></span>Called on <strong>'+fmtDate(p.purchaseDate)+'</strong>'+
        (p.purchasePrice?' at <strong>'+esc(p.purchasePrice)+'</strong>':'')+'</div>'
      : '';

    /* The ask — invite a call instead of publishing one */
    const askURL = ASK.href +
      '?ask=' + encodeURIComponent(p.asset) +
      (p.currentPrice ? '&at=' + encodeURIComponent(p.currentPrice) : '') +
      '&cat=' + encodeURIComponent(ASK.category);
    const askBtn =
      '<a class="ask" href="'+esc(askURL)+'">' +
        '<span class="ask-txt">'+esc(ASK.label)+'</span>' +
        '<svg class="ask-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>' +
      '</a>';

    /* The vault — opens the slab gallery for positions that have one */
    const vaultBtn = p.gallery
      ? '<button type="button" class="vault-btn" data-open-vault>'+
          '<span class="vb-flag" aria-hidden="true"></span>'+
          '<span class="vb-txt">View the vault</span>'+
          '<svg class="vb-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>'+
        '</button>'
      : '';

    return ''+
    '<article class="position" data-cat="'+esc(p.category)+'">'+
      '<div class="pos-top">'+
        '<span class="pos-cat'+markCls+'" aria-hidden="true">'+ mark +'</span>'+
        '<div class="pos-id">'+
          '<h3>'+esc(p.asset)+ conv +'</h3>'+
          '<div class="sub">'+esc(c.label)+(p.sub?' \u00B7 '+esc(p.sub):'')+'</div>'+
        '</div>'+
        '<div class="pos-tags">'+
          (p.action?'<span class="badge '+actionCls+'">'+esc(p.action)+'</span>':'')+ statusBadge+
        '</div>'+
      '</div>'+
      receipt+
      (metricHTML?'<div class="pos-metrics">'+metricHTML+'</div>':'')+
      (p.note?'<div class="pos-note"><span class="lbl">Thesis</span>'+esc(p.note)+'</div>':'')+
      vaultBtn+
      askBtn+
    '</article>';
  }

  /* ---- Laundromat goal: animated progress bar toward the target ---- */
  function renderGoal(){
    const el = document.getElementById('goal');
    if(!el || typeof GOAL==='undefined') return;
    const pct = Math.max(0, Math.min(100, (GOAL.saved/GOAL.target)*100));
    const milestones = [25,50,75,100];
    el.innerHTML =
      '<div class="goal-card">'+
        '<div class="goal-head">'+
          '<div>'+
            '<div class="goal-eyebrow">Power Play \u00B7 In Progress</div>'+
            '<h3 class="goal-title">'+esc(GOAL.title)+'</h3>'+
            '<p class="goal-sub">'+esc(GOAL.subtitle)+'</p>'+
          '</div>'+
          '<div class="goal-pct" id="goal-pct">0%</div>'+
        '</div>'+
        '<div class="goal-track">'+
          '<div class="goal-fill" id="goal-fill" style="width:0%"></div>'+
          milestones.map(m=>'<span class="goal-mile" style="left:'+m+'%"></span>').join('')+
        '</div>'+
        '<div class="goal-figures">'+
          '<div><span class="gf-k">Saved</span><span class="gf-v up" id="goal-saved">$0</span></div>'+
          '<div class="gf-mid"><span class="gf-k">Remaining</span><span class="gf-v" id="goal-remaining">$0</span></div>'+
          '<div class="gf-end"><span class="gf-k">Goal</span><span class="gf-v">'+fmtMoney(GOAL.target)+'</span></div>'+
        '</div>'+
        (GOAL.note?'<p class="goal-note">'+esc(GOAL.note)+'</p>':'')+
      '</div>';

    const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
    const fill=document.getElementById('goal-fill');
    const pctEl=document.getElementById('goal-pct');
    const savedEl=document.getElementById('goal-saved');
    const remEl=document.getElementById('goal-remaining');

    function paint(p){
      const saved = GOAL.target*(p/100);
      pctEl.textContent = (Math.round(p*10)/10)+'%';
      savedEl.textContent = fmtMoney(saved);
      remEl.textContent = fmtMoney(Math.max(0, GOAL.target-saved));
    }

    if(reduced){ fill.style.width=pct+'%'; paint(pct); return; }

    // Animate the fill + count-up once the card scrolls into view
    const start = ()=>{
      const dur=1400, t0=performance.now();
      requestAnimationFrame(function step(now){
        const k=Math.min(1,(now-t0)/dur);
        const eased=1-Math.pow(1-k,3); // easeOutCubic
        fill.style.width=(pct*eased)+'%';
        paint(pct*eased);
        if(k<1) requestAnimationFrame(step);
      });
    };
    if('IntersectionObserver' in window){
      const go=new IntersectionObserver((es)=>es.forEach(x=>{ if(x.isIntersecting){ start(); go.disconnect(); }}),{threshold:.35});
      go.observe(el);
    } else start();
  }

  function fmtMoney(n){
    n=Math.round(n);
    if(n>=1000000) return '$'+(n/1000000).toFixed(n%1000000===0?0:2)+'M';
    return '$'+n.toLocaleString('en-US');
  }
  function fmtDate(s){
    const d = new Date(s+'T00:00:00');
    if(isNaN(d)) return esc(s);
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  }
  function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
})();

/* Starfield — identical engine to the other pages. */
(function starfield(){
  const canvas=document.getElementById('sky'); if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;
  let stars=[],W,H,raf=0,last=0;
  function make(){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    W=window.innerWidth; H=window.innerHeight; canvas.width=W*dpr; canvas.height=H*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
    const count=Math.min(160,Math.round((W*H)/9000));
    stars=Array.from({length:count},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+0.3,s:Math.random()*12+6,p:Math.random()*Math.PI*2,t:Math.random()*0.015+0.004}));
  }
  function frame(now){
    const tnow=now||performance.now(); const dt=last?Math.min((tnow-last)/1000,0.05):0.016; last=tnow;
    ctx.clearRect(0,0,W,H);
    for(const st of stars){
      st.p+=st.t;
      if(!reduced){ st.y-=st.s*dt; if(st.y<-2){ st.y=H+2; st.x=Math.random()*W; } }
      ctx.globalAlpha=Math.max(0.08,0.35+Math.sin(st.p)*0.25);
      ctx.fillStyle=st.r>1?'#a3c4dc':'#e9ecf1';
      ctx.beginPath(); ctx.arc(st.x,st.y,st.r,0,6.2832); ctx.fill();
    }
    ctx.globalAlpha=1; if(!reduced) raf=requestAnimationFrame(frame);
