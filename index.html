<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0c10">
<meta name="description" content="Northspire Ventures — Building Companies That Endure. The digital headquarters of Geo's ecosystem.">
<title>Northspire Hub — Building Companies That Endure</title>

<!-- Typography: Marcellus (display) + Albert Sans (body) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Albert+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ==========================================================================
   NORTHSPIRE HUB — Design Tokens
   Edit these variables to re-theme the entire page.
   ========================================================================== */
:root{
  /* Palette — glacial dark, "north star" cold accent */
  --bg:          #0a0c10;
  --surface:     #10141b;
  --surface-2:   #141a23;
  --border:      #1e2530;
  --border-lit:  #2c3644;
  --text:        #e9ecf1;
  --muted:       #8c95a3;
  --faint:       #5b6472;
  --accent:      #a3c4dc;                    /* polar ice */
  --accent-soft: rgba(163,196,220,.10);
  --glow:        rgba(163,196,220,.07);

  /* Type */
  --font-display: 'Marcellus', 'Times New Roman', serif;
  --font-body:    'Albert Sans', -apple-system, 'SF Pro Text', system-ui, sans-serif;

  /* Shape & rhythm */
  --radius:      18px;
  --radius-sm:   14px;
  --gutter:      20px;
  --shadow:      0 1px 2px rgba(0,0,0,.4), 0 12px 32px rgba(0,0,0,.35);
  --shadow-lift: 0 2px 4px rgba(0,0,0,.4), 0 20px 48px rgba(0,0,0,.5);
}

/* ==========================================================================
   Base
   ========================================================================== */
*{ margin:0; padding:0; box-sizing:border-box; }

html{ scroll-behavior:smooth; -webkit-text-size-adjust:100%; text-size-adjust:100%; }

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  font-size:16px;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  min-height:100dvh;
  /* Faint vertical "meridian" — a hairline of light down the page spine */
  background-image:linear-gradient(to bottom, transparent, rgba(163,196,220,.03) 20%, rgba(163,196,220,.03) 80%, transparent);
  background-size:1px 100%;
  background-position:50% 0;
  background-repeat:no-repeat;
}

::selection{ background:var(--accent); color:var(--bg); }

/* Starfield canvas — sits behind everything, never intercepts taps */
#sky{
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none;
}

a{ color:inherit; text-decoration:none; }

/* ==========================================================================
   Page shell — mobile-first column, graceful desktop expansion
   ========================================================================== */
.shell{
  width:100%;
  max-width:640px;
  margin:0 auto;
  padding:0 var(--gutter) calc(48px + env(safe-area-inset-bottom));
}

/* ==========================================================================
   Hero — the front door of the ecosystem
   ========================================================================== */
.hero{
  position:relative;
  text-align:center;
  padding:88px 12px 56px;
}

/* Cold radial glow behind the mark — the "north light" */
.hero::before{
  content:"";
  position:absolute;
  top:-120px; left:50%;
  width:480px; height:480px;
  transform:translateX(-50%);
  background:radial-gradient(closest-side, var(--glow), transparent 70%);
  pointer-events:none;
}

/* North-star mark */
.mark{
  width:52px; height:52px;
  margin:0 auto 28px;
  position:relative;
  color:var(--accent);
  animation:mark-pulse 6s ease-in-out infinite;
}
.mark svg{ width:100%; height:100%; display:block; }

@keyframes mark-pulse{
  0%,100%{ opacity:.85; filter:drop-shadow(0 0 6px rgba(163,196,220,.25)); }
  50%    { opacity:1;   filter:drop-shadow(0 0 14px rgba(163,196,220,.45)); }
}

.hero h1{
  font-family:var(--font-display);
  font-size:clamp(30px, 8vw, 42px);
  font-weight:400;
  letter-spacing:.22em;
  text-transform:uppercase;
  margin-bottom:6px;
}
.hero h1 span{ color:var(--accent); }

.hero .ventures{
  font-size:12px;
  letter-spacing:.42em;
  text-transform:uppercase;
  color:var(--faint);
  margin-bottom:26px;
}

.hero .tagline{
  font-family:var(--font-display);
  font-size:clamp(17px, 4.6vw, 20px);
  color:var(--muted);
  font-style:normal;
  max-width:32ch;
  margin:0 auto;
}

/* Thin rule with a small star, closing the hero */
.hero .rule{
  display:flex; align-items:center; gap:14px;
  margin:44px auto 0;
  max-width:280px;
  color:var(--faint);
}
.hero .rule::before,
.hero .rule::after{
  content:""; flex:1; height:1px;
  background:linear-gradient(to right, transparent, var(--border-lit));
}
.hero .rule::after{
  background:linear-gradient(to left, transparent, var(--border-lit));
}
.hero .rule svg{ width:12px; height:12px; flex:none; color:var(--accent); opacity:.7; }

/* ==========================================================================
   Sections
   ========================================================================== */
.section{ margin-top:52px; }

.section-head{
  display:flex; align-items:baseline; gap:12px;
  margin-bottom:16px;
  padding:0 4px;
}
.section-head h2{
  font-family:var(--font-body);
  font-size:12px;
  font-weight:600;
  letter-spacing:.28em;
  text-transform:uppercase;
  color:var(--muted);
}
.section-head .count{
  font-size:11px;
  letter-spacing:.1em;
  color:var(--faint);
}

/* ==========================================================================
   Cards
   ========================================================================== */
.cards{ display:grid; gap:12px; }

.card{
  display:flex; align-items:center; gap:16px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:18px;
  box-shadow:var(--shadow);
  transition:transform .28s cubic-bezier(.2,.8,.2,1),
             border-color .28s ease,
             background .28s ease,
             box-shadow .28s ease;
  -webkit-tap-highlight-color:transparent;
}

.card:hover,
.card:focus-visible{
  transform:translateY(-2px);
  border-color:var(--border-lit);
  background:var(--surface-2);
  box-shadow:var(--shadow-lift);
}
.card:active{ transform:translateY(0) scale(.985); }

.card:focus-visible{
  outline:2px solid var(--accent);
  outline-offset:2px;
}

.card-icon{
  flex:none;
  width:44px; height:44px;
  display:grid; place-items:center;
  border-radius:12px;
  background:var(--accent-soft);
  color:var(--accent);
  border:1px solid rgba(163,196,220,.14);
}
.card-icon svg{ width:20px; height:20px; }

.card-body{ flex:1; min-width:0; }
.card-body h3{
  font-size:15.5px;
  font-weight:600;
  letter-spacing:.01em;
}
.card-body p{
  font-size:13px;
  color:var(--muted);
  margin-top:2px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.card-arrow{
  flex:none;
  color:var(--faint);
  transition:transform .28s cubic-bezier(.2,.8,.2,1), color .28s ease;
}
.card-arrow svg{ width:16px; height:16px; display:block; }
.card:hover .card-arrow,
.card:focus-visible .card-arrow{
  transform:translateX(4px);
  color:var(--accent);
}

/* Spotlight card — a lead card with extra presence (e.g. the founder) */
.card.spotlight{
  padding:22px;
  background:linear-gradient(180deg, var(--surface-2), var(--surface));
  border-color:var(--border-lit);
}
.card.spotlight .card-icon{ width:50px; height:50px; }
.card.spotlight .card-icon svg{ width:23px; height:23px; }
.card.spotlight .card-body h3{
  font-family:var(--font-display);
  font-weight:400;
  font-size:18.5px;
  letter-spacing:.03em;
}
.card.spotlight .card-body p{ white-space:normal; }

/* Venture cards — flagship companies with their actions built in */
.card.venture{
  flex-direction:column;
  align-items:stretch;
  gap:0;
  padding:0;
  overflow:hidden;   /* hard boundary — snapshot can never escape the rounded card */
}
.venture-head{
  display:flex; align-items:center; gap:16px;
  padding:20px 18px 14px;
  border-radius:var(--radius) var(--radius) 0 0;
  -webkit-tap-highlight-color:transparent;
}
.venture-head:focus-visible{
  outline:2px solid var(--accent);
  outline-offset:-2px;
}
.card.venture .card-icon{
  width:50px; height:50px;
  font-family:var(--font-display);
  font-size:21px;
}
.card.venture .card-body h3{
  font-family:var(--font-display);
  font-weight:400;
  font-size:18.5px;
  letter-spacing:.03em;
}
.card.venture .card-body p{ white-space:normal; }

/* Live site snapshot inside the venture card (wrapper + img) */
.venture-shot{
  display:block;
  width:calc(100% - 36px);
  margin:2px auto 0;
  aspect-ratio:2 / 1;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--surface-2);
  overflow:hidden;
}
.venture-shot img{
  display:block;
  width:100%; height:100%;
  object-fit:cover;
  object-position:top;
}

/* Action chips — each venture's calls to action */
.venture-actions{
  display:flex; flex-wrap:wrap; gap:8px;
  padding:14px 18px 18px;
}
.chip{
  display:inline-flex; align-items:center; gap:8px;
  padding:10px 14px;
  border-radius:12px;
  background:var(--surface-2);
  border:1px solid var(--border-lit);
  font-size:13px; font-weight:500;
  color:var(--text);
  transition:border-color .28s ease, transform .28s cubic-bezier(.2,.8,.2,1);
  -webkit-tap-highlight-color:transparent;
}
.chip svg{ width:15px; height:15px; color:var(--accent); }
.chip .chip-arrow svg{
  width:12px; height:12px;
  color:var(--faint);
  transition:transform .28s ease, color .28s ease;
}
.chip:hover,
.chip:focus-visible{ border-color:var(--accent); }
.chip:hover .chip-arrow svg,
.chip:focus-visible .chip-arrow svg{ transform:translateX(3px); color:var(--accent); }
.chip:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
.chip:active{ transform:scale(.97); }

/* Compact tiles — social grid */
.cards.tiles{
  grid-template-columns:repeat(3, 1fr);
  gap:10px;
}
.tile{
  flex-direction:column;
  gap:10px;
  padding:18px 8px;
  text-align:center;
}
.tile .card-icon{ width:40px; height:40px; }
.tile .card-body h3{ font-size:12.5px; font-weight:500; }
.tile .card-body p, .tile .card-arrow{ display:none; }

/* ==========================================================================
   Footer
   ========================================================================== */
footer{
  margin-top:72px;
  text-align:center;
  color:var(--faint);
  font-size:12px;
  letter-spacing:.12em;
}
footer .foot-mark{
  width:14px; height:14px;
  margin:0 auto 14px;
  color:var(--accent);
  opacity:.55;
}
footer .foot-mark svg{ width:100%; height:100%; }
footer p + p{ margin-top:6px; }

/* ==========================================================================
   Entrance animation — staggered rise on load
   ========================================================================== */
.rise{
  opacity:0;
  transform:translateY(14px);
  animation:rise .7s cubic-bezier(.2,.8,.2,1) forwards;
  animation-delay:var(--d, 0s);
}
@keyframes rise{ to{ opacity:1; transform:none; } }

/* Respect users who prefer less motion */
@media (prefers-reduced-motion: reduce){
  html{ scroll-behavior:auto; }
  .rise{ animation:none; opacity:1; transform:none; }
  .mark{ animation:none; }
  .card, .card-arrow{ transition:none; }
}

/* ==========================================================================
   Desktop — generous expansion
   ========================================================================== */
@media (min-width: 720px){
  :root{ --gutter:32px; }
  .shell{ max-width:840px; }
  .hero{ padding-top:120px; }
  .section{ margin-top:64px; }
  .cards{ gap:14px; }
  .cards.tiles{ grid-template-columns:repeat(6, 1fr); }
  .cards.cols-2{ grid-template-columns:1fr 1fr; }

  /* Venture cards go two-column on desktop:
     the left content (title, description, chips) drives the card height;
     the snapshot fills that exact height on the right — no void, no overflow.
     Only applies while the card actually has a snapshot (.has-shot). */
  .card.venture.has-shot{
    display:grid;
    grid-template-columns:1fr 300px;
    grid-template-areas:
      "head shot"
      "acts shot";
    align-items:start;
  }
  .card.venture.has-shot .venture-head{
    grid-area:head;
    padding:26px 18px 14px 24px;
  }
  .card.venture.has-shot .venture-actions{
    grid-area:acts;
    padding:0 18px 26px 24px;
    align-content:flex-start;
  }
  /* Snapshot wrapper fills its grid area exactly (both rows on the right).
     No min-height or auto sizing to fight with — the grid area, driven by the
     left column's height, is the single source of truth. The card's own
     overflow:hidden is the hard boundary nothing can escape. */
  .card.venture.has-shot .venture-shot{
    grid-area:shot;
    align-self:stretch;
    justify-self:stretch;
    position:relative;
    width:auto;
    height:auto;
    min-height:0;
    aspect-ratio:auto;
    margin:14px 14px 14px 6px;
  }
  .card.venture.has-shot .venture-shot img{
    position:absolute;
    inset:0;
    width:100%; height:100%;
    object-position:top left;
  }
}
</style>
</head>
<body>

<!-- Starfield — fixed behind all content, drawn by the script below -->
<canvas id="sky" aria-hidden="true"></canvas>

<div class="shell">

  <!-- ======================================================================
       HERO
       ====================================================================== -->
  <header class="hero rise" style="--d:.05s">
    <div class="mark" aria-hidden="true">
      <!-- North-star mark: elongated four-point star -->
      <svg viewBox="0 0 48 48" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 2 L27.5 20.5 L46 24 L27.5 27.5 L24 46 L20.5 27.5 L2 24 L20.5 20.5 Z"/>
      </svg>
    </div>
    <h1>North<span>spire</span></h1>
    <div class="ventures">Ventures</div>
    <p class="tagline">Building Companies That Endure</p>
    <div class="rule" aria-hidden="true">
      <svg viewBox="0 0 48 48" fill="currentColor"><path d="M24 4 L27 21 L44 24 L27 27 L24 44 L21 27 L4 24 L21 21 Z"/></svg>
    </div>
  </header>

  <!-- ======================================================================
       SECTIONS — rendered from the HUB config in the script below.
       To add a company, project, or link: edit the config. No markup needed.
       ====================================================================== -->
  <main id="hub"></main>

  <!-- ======================================================================
       FOOTER
       ====================================================================== -->
  <footer class="rise" style="--d:.65s">
    <div class="foot-mark" aria-hidden="true">
      <svg viewBox="0 0 48 48" fill="currentColor"><path d="M24 4 L27 21 L44 24 L27 27 L24 44 L21 27 L4 24 L21 21 Z"/></svg>
    </div>
    <p>NORTHSPIRE VENTURES</p>
    <p id="year"></p>
  </footer>

</div>

<script>

   • To add a venture:  copy a venture object (one with an `actions` array).

const HUB = {

/* ==========================================================================
   Renderer — turns the config above into the page.
   You should not need to edit anything below this line.
   ========================================================================== */
(function render(){
  const root = document.getElementById('hub');
  let delay = 0.15; // entrance stagger, seconds

  HUB.sections.forEach(section => {
    const sec = document.createElement('section');
    sec.className = 'section rise';
    sec.style.setProperty('--d', delay.toFixed(2) + 's');
    delay += 0.08;

    // Section header
    const head = document.createElement('div');
    head.className = 'section-head';
    head.innerHTML =
      '<h2>' + esc(section.label) + '</h2>' +
      '<span class="count">' + section.links.length + '</span>';
    sec.appendChild(head);

    // Cards
    const grid = document.createElement('div');
    grid.className = 'cards'
      + (section.tiles ? ' tiles' : '')
      + (section.columns === 2 ? ' cols-2' : '');

    section.links.forEach(link => {
      grid.appendChild(link.actions ? ventureCard(link) : linkCard(link, section.tiles));
    });

    sec.appendChild(grid);
    root.appendChild(sec);
  });

  // Footer year
  document.getElementById('year').textContent =
    '© ' + new Date().getFullYear() + ' · All ventures under one spire';

  /* ---- card builders ---- */

  // Standard link card (also used for social tiles)
  function linkCard(link, tile){
    const a = document.createElement('a');
    a.className = 'card' + (tile ? ' tile' : '') + (link.spotlight ? ' spotlight' : '');
    setHref(a, link.href);
    a.innerHTML =
      '<span class="card-icon" aria-hidden="true">' + (ICONS[link.icon] || '') + '</span>' +
      '<span class="card-body">' +
        '<h3>' + esc(link.title) + '</h3>' +
        (link.desc ? '<p>' + esc(link.desc) + '</p>' : '') +
      '</span>' +
      '<span class="card-arrow" aria-hidden="true">' + ICONS.arrow + '</span>';
    return a;
  }

  // Venture card: linked header + live site snapshot + action chips.
  // Built as an <article> because nested <a> tags are invalid HTML.
  function ventureCard(link){
    const art = document.createElement('article');
    art.className = 'card venture';

    // Header — links to the venture's home
    const head = document.createElement('a');
    head.className = 'venture-head';
    setHref(head, link.href);
    head.innerHTML =
      '<span class="card-icon" aria-hidden="true">' + esc(link.monogram || '') + '</span>' +
      '<span class="card-body">' +
        '<h3>' + esc(link.title) + '</h3>' +
        (link.desc ? '<p>' + esc(link.desc) + '</p>' : '') +
      '</span>' +
      '<span class="card-arrow" aria-hidden="true">' + ICONS.arrow + '</span>';
    art.appendChild(head);

    // Live snapshot of the venture's site, rendered at view time by
    // WordPress mShots (free, no API key). First-ever request may show
    // a loading frame while the snapshot generates; it's cached after.
    // If it fails to load, the image removes itself — no broken frames.
    if (link.preview){
      art.classList.add('has-shot');
      const shot = document.createElement('span');
      shot.className = 'venture-shot';
      const img = document.createElement('img');
      img.loading = 'lazy';
      img.alt = 'Preview of ' + link.title;
      img.src = 'https://s0.wp.com/mshots/v1/' + encodeURIComponent(link.href) + '?w=800';
      img.onerror = () => { shot.remove(); art.classList.remove('has-shot'); };
      shot.appendChild(img);
      art.appendChild(shot);
    }

    // Action chips
    const actions = document.createElement('div');
    actions.className = 'venture-actions';
    link.actions.forEach(act => {
      const chip = document.createElement('a');
      chip.className = 'chip';
      setHref(chip, act.href);
      chip.innerHTML =
        (ICONS[act.icon] || '') +
        '<span>' + esc(act.title) + '</span>' +
        '<span class="chip-arrow" aria-hidden="true">' + ICONS.arrow + '</span>';
      actions.appendChild(chip);
    });
    art.appendChild(actions);

    return art;
  }

  /* ---- helpers ---- */

  // External links open in a new tab; mailto/tel/# stay in place
  function setHref(a, href){
    a.href = href;
    if (/^https?:/i.test(href)) {
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
    }
  }

  // Escape user-editable strings so config edits can never break markup
  function esc(s){
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }
})();

/* ==========================================================================
   Starfield — a quiet northern sky behind the page.
   Stars twinkle and drift slowly toward the top ("north"). Density scales
   with screen size. Pauses when the tab is hidden; renders a static sky
   for visitors who prefer reduced motion.
   ========================================================================== */
(function starfield(){
  const canvas = document.getElementById('sky');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  let stars = [], W, H, raf = 0;

  function build(){
    const dpr = Math.min(window.devicePixelRatio || 1, 2); // cap for phone perf
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    const count = Math.min(160, Math.round((W * H) / 9000));
    stars = Array.from({ length: count }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.1 + 0.3,        // radius: 0.3–1.4px, atmosphere not confetti
      s: Math.random() * 12 + 6,           // drift speed: 6–18 px per SECOND, northward
      p: Math.random() * Math.PI * 2,      // twinkle phase
      t: Math.random() * 0.015 + 0.004     // twinkle speed
    }));
  }

  let last = 0;
  function frame(now){
    // Time-based motion: same speed on 60Hz and 120Hz displays.
    // dt is capped so returning to a background tab never causes a jump.
    const t = now || performance.now();
    const dt = last ? Math.min((t - last) / 1000, 0.05) : 0.016;
    last = t;

    ctx.clearRect(0, 0, W, H);
    for (const st of stars){
      st.p += st.t;
      if (!reduced){
        st.y -= st.s * dt;                  // drift north
        if (st.y < -2){ st.y = H + 2; st.x = Math.random() * W; }
      }
      // Twinkle between ~0.1 and ~0.6 alpha; larger stars take the accent tint
      ctx.globalAlpha = Math.max(0.08, 0.35 + Math.sin(st.p) * 0.25);
      ctx.fillStyle = st.r > 1 ? '#a3c4dc' : '#e9ecf1';
      ctx.beginPath();
      ctx.arc(st.x, st.y, st.r, 0, 6.2832);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    if (!reduced) raf = requestAnimationFrame(frame);
  }

  build();
  frame(); // reduced-motion visitors get one static, already-varied sky

  window.addEventListener('resize', () => {
    cancelAnimationFrame(raf);
    build();
    frame();
  });

  // Don't burn battery in a background tab
  document.addEventListener('visibilitychange', () => {
    cancelAnimationFrame(raf);
    if (!document.hidden && !reduced){ last = 0; frame(); }
  });
})();</script>
